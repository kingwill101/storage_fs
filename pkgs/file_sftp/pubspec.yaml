  mime: ^2.0.0
  meta: ^1.17.0
dev_dependencies:
  lints: ^6.0.0
  mocktail: ^1.0.4
  test: ^1.26.3
  testcontainers_core: ^1.0.0
  testcontainers_compose: ^1.0.0
